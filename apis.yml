aid: logic-apps
name: Azure Logic Apps
description: >-
  Azure Logic Apps is a cloud-based workflow automation service for integrating apps, data, and services across
  organizations. It provides a managed iPaaS platform with hundreds of connectors, a visual workflow designer, and a
  fully documented Azure Resource Manager REST API for managing workflows, runs, triggers and versions.
